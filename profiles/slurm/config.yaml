# Snakemake SLURM Profile
# Usage: snakemake --profile profiles/slurm

executor: slurm
use-conda: true
conda-frontend: mamba
jobs: 100
printshellcmds: true
reason: true
show-failed-logs: true
keep-going: true
rerun-incomplete: true
restart-times: 1

# Resources to use if a rule doesn't specify them.
# Rules define their own memory/CPU, so Snakemake will use those 
# instead of these defaults for most tasks.
default-resources:
  - mem_mb=4000
  - time="01:00:00"
  - threads=1
  - slurm_partition="standard"




