# =============================================================================
# ChIPseq Pipeline Configuration
# =============================================================================
# Author:  Himanshu Bhandary
# Contact: 2032ushimanshu@gmail.com
# =============================================================================

global:
    samples: "data/fastp/samples.tsv"
    bowtie_index: "data/02_alignment/bowtie2/index/genome"
    genome_fa: "data/reference/genome.fa"
    genome_chrom_sizes: "data/reference/genome.chrom.sizes"
    blacklist: "data/reference/ENCODE_blacklist.bed"
    annotation_gtf: "data/reference/annotation.gtf"

# --- Preprocessing -----------------------------------------------------------

fastp:
  output:
    dir: "results/fastp"
  params:
    trim_front1: 5
    trim_front2: 5
    length_required: 30
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

fastqc:
  input:
    R1: "results/fastp"
    R2: "results/fastp"
  output: "results/fastqc"
  threads: 4
  resources:
    mem_mb: 2000
    time: "00:30:00"

# --- Alignment ---------------------------------------------------------------

bowtie2:
  input: "results/fastp"
  output: "results/bowtie2"
  threads: 4
  sensitive: "--very-sensitive"
  resources:
    mem_mb: 8000
    time: "02:00:00"

# --- Post-alignment Processing -----------------------------------------------

samtools_sort:
  input:
    unsorted_bam: "results/bowtie2"
  output:
    sorted_bam: "results/samtools_sort"
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

# --- Mitochondrial Read Filtering ---------------------------------------------
# Note: Mitochondrial genes are labelled differently across genome assemblies.
# Use "MT" for Ensembl-style or "chrM" for UCSC-style references.

mito_ChIP_calculate:
  input:
    sorted_bam: "results/samtools_sort"
  output:
    mito_stats: "results/mito_ChIP"
  params:
    mito_chr: "MT"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

remove_mito_reads:
  input:
    sorted_bam: "results/samtools_sort"
  output:
    noMT_sorted_bam: "results/remove_mito_reads"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"
  params:
    mito_chr: "MT"

# --- Duplicate Marking -------------------------------------------------------

samtools_fixmate:
    input:
        sorted_bam_noMT: "results/remove_mito_reads"
    output:
        sorted_bam_noMT_fixmate: "results/samtools_fixmate"
    threads: 2
    resources:
        mem_mb: 2000
        time: "00:30:00"

samtools_markdup:
  input:
    sorted_bam_noMT_fixmate: "results/samtools_fixmate"
  output:
    markdup_bam: "results/samtools_markdup"
  params:
    remove_duplicates: "r"
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

samtools_index_post_markdup:
  input:
    markdup_bam: "results/samtools_markdup"
  output:
    index: "results/samtools_index/post_markdup"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

# --- BAM Filtering & Indexing ------------------------------------------------

samtools_view:
  input:
    markdup_bam: "results/samtools_markdup"
  output:
    filtered_bam: "results/samtools_view"
  params:
    MAPQ: 30
    flags: 3844
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

samtools_index_post_filter:
  input:
    filtered_bam: "results/samtools_view"
  output:
    filtered_bam_indexed: "results/samtools_view"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

# --- Post-filtering Statistics ------------------------------------------------

samtools_stats:
  input:
    filtered_bam: "results/samtools_view"
  output:
    stats: "results/samtools_stats"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"

fragment_size_analysis:
  input:
    metrics: "results/picard/CollectInsertSizeMetrics"
  output: "results/fragment_size_analysis"
  threads: 4
  params:
    min_length: 30
    max_length: 1000
    max_fragment: 1000
  resources:
    mem_mb: 4000
    time: "01:00:00"

# --- Picard Metrics -----------------------------------------------------------

picard_collect_alignment_summary_metrics:
  input:
    markdup_bam: "results/samtools_markdup"
  output:
    alignment_metrics: "results/picard/CollectAlignmentSummaryMetrics"
  params:
    validation_stringency: "LENIENT"
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

picard_collect_insert_size_metrics:
  input:
    markdup_bam: "results/samtools_markdup"
  output:
    metrics: "results/picard/CollectInsertSizeMetrics"
    histogram: "results/picard/CollectInsertSizeMetrics"
  params:
    M: 0.05
    validation_stringency: "LENIENT"
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

# --- Coverage & BigWig --------------------------------------------------------

bedtools_genomecov:
  input:
    filtered_bam: "results/samtools_view"
  output:
    bedgraph: "results/bedtools_genomecov"
  params:
    extra: "-bg"
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

sorted_bedgraph:
  input:
    bedgraph: "results/bedtools_genomecov"
  output:
    sorted_bedgraph: "results/sorted_bedgraph_file"
  params:
    mem_mb: 2000
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

bigwig:
  input:
    sorted_bedgraph: "results/sorted_bedgraph_file"
  output:
    bigwig: "results/bigwig"
  params:
    genome: "data/reference/genome.chrom.sizes"

bamCompare:
  input:
    filtered_bam: "results/samtools_view"
  output:
    normalized_coverage: "results/bamCompare"
  params:
    operation: "log2" # [log2|ratio|subtract|add|mean|reciprocal|first|second]
    binSize: 10
    outFileFormat: "bigwig"
  threads: 8
  resources:
    mem_mb: 16000
    time: "02:00:00"

# --- Correlation Analysis -----------------------------------------------------

correlation_analysis:
  input:
    bigwig: "results/bigwig"
  output: "results/correlation_analysis"
  params:
    bin_size: 1000
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

normalized_coverage:
  input:
    filtered_bam: "results/samtools_view"
  output:
    normalized_coverage: "results/normalized_coverage"
  params:
    method: "CPM"
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

# --- Peak Calling & Filtering ------------------------------------------------

macs_peakcall:
  input:
    filtered_bam: "results/samtools_view"
  output:
    peaks: "results/macs2_peakcall"
  params:
    genome_size: "hs"
    qvalue: 0.01
    nomodel: "--nomodel"    # Skip MACS2 model-based fragment length estimation
    format: "BAMPE"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

blacklist_region_filter:
  input:
    peaks: "results/macs2_peakcall"
  output:
    filtered_peaks: "results/filtered_peaks"
  threads: 4
  resources:
    mem_mb: 8000
    time: "02:00:00"

# --- Downstream Analysis -----------------------------------------------------

heatmap:
  input:
    filtered_peaks: "results/filtered_peaks"
    bigwig: "results/bigwig"
  output:
    plot: "results/heatmap/plot"
    matrix: "results/heatmap/matrix"
    regions: "results/heatmap"
    color: "coolwarm"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"
  params:
    upstream: 3000
    downstream: 3000

frip_calculation:
  input:
    filtered_peaks: "results/filtered_peaks"
    filtered_bam: "results/samtools_view"
  output: "results/frip_calculation"
  threads: 4
  resources:
    mem_mb: 2000
    time: "00:15:00"

peak_annotation:
  input:
    filtered_peaks: "results/filtered_peaks"
  output: "results/peak_annotation"
  params:
    feature_types: "gene, exon, CDS"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

motif_analysis:
  input:
    filtered_peaks: "results/filtered_peaks"
  output: "results"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

# --- QC Metrics ---------------------------------------------------------------

phantompeakqualtools:
  input:
    indexed_dedup: "results/samtools_index/post_markdup"
    dedup_bam: "results/samtools_markdup"
  output:
    qc_metrics: "results/phantompeakqualtools"
  threads: 8
  resources:
    mem_mb: 16000
    time: "04:00:00"

preseq:
  input:
    markdup_bam: "results/samtools_markdup"
    markdup_bam_index: "results/samtools_index/post_markdup"
  output:
    predicted_complexity: "results/preseq"
  resources:
    mem_mb: 4000
    time: "01:00:00"

qualimap_bamqc:
  input:
    markdup_bam: "results/samtools_markdup"
  output:
    qc_dir: "results/qualimap"
  threads: 4
  resources:
    mem_mb: 4000
    time: "01:00:00"

# --- QC Gate Thresholds --------------------------------------------------------

qc_gate:
  input:
    frip: "results/frip_calculation"
    phantom: "results/phantompeakqualtools"
    stats: "results/samtools_stats"
  output:
    dir: "results/qc_gate"
  params:
    min_frip: 0.05
    min_nsc: 1.05
    min_rsc: 0.8
    min_mapping_rate: 90.0    # Percentage
    max_duplicate_rate: 20.0 # Percentage
  threads: 1
  resources:
    mem_mb: 1000
    time: "00:10:00"

# --- Aggregated Report --------------------------------------------------------

multiqc:
  input:
    reports_dir: "results/"
  output:
    report: "results/multiqc"
  threads: 2
  resources:
    mem_mb: 2000
    time: "00:30:00"
